<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 400px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 6px; margin-bottom: 6px; box-sizing: border-box; }
        .error { color: #b00020; font-size: 0.9em; margin-bottom: 12px; }
        .buttons { margin-top: 16px; }
        .buttons a { margin-left: 8px; }
    </style>
</head>
<body>
    <h1>Add Employee</h1>

    <form th:action="@{/employees}" th:object="${employee}" method="post">
        <label for="name">Employee Name</label>
        <input type="text" id="name" th:field="*{name}" maxlength="100">
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>

        <div class="buttons">
            <button type="submit">Save</button>
            <a th:href="@{/employees}">Cancel</a>
        </div>
    </form>
</body>
</html>
